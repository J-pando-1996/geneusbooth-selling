<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Geneus DNA — Event Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --card: #111827;
  --card2: #1a2235;
  --border: #2a3a55;
  --accent: #00c9a7;
  --accent2: #4f8fff;
  --gold: #f5c842;
  --danger: #ff5c5c;
  --text: #e8edf5;
  --muted: #8b9ebf;
  --tag-dog-bg: #1a2d3a; --tag-dog: #4fc3f7;
  --tag-std-bg: #1a2b1a; --tag-std: #81c784;
  --tag-prem-bg: #2a1f3a; --tag-prem: #ce93d8;
  --tag-premex-bg: #2a2510; --tag-premex: #ffcc80;
  --tag-plus-bg: #2a1510; --tag-plus: #ff8c42;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; font-size: clamp(14px, 2vw, 16px); padding-bottom: 80px; }

/* HEADER */
.header { text-align: center; padding: 20px 16px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
.header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(20px, 4vw, 28px); font-weight: 900; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
.header p { color: var(--muted); margin-top: 4px; font-size: clamp(12px, 1.5vw, 15px); }

/* TABS */
.tab-container { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 14px 0; background: transparent; border: none; color: var(--muted); font-family: 'Sarabun', sans-serif; font-size: clamp(14px, 2.5vw, 18px); font-weight: 700; cursor: pointer; transition: 0.2s; border-bottom: 3px solid transparent; }
.tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(0, 201, 167, 0.05); }

/* CONTENT WRAPPER */
.content { padding: 20px 16px; display: none; }
.content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* PROMO */
.promo-note { background: linear-gradient(135deg,#1a2e20,#0f2a3a); border: 1px solid var(--accent); border-radius: 12px; padding: clamp(12px, 2vw, 18px); text-align: center; margin-bottom: 20px; font-size: clamp(13px, 2vw, 18px); color: var(--accent); font-weight: 700; box-shadow: 0 4px 12px rgba(0,201,167,0.1); }
.promo-note span { color: var(--text); font-weight: 400; display: block; margin-top: 4px; font-size: clamp(11px, 1.5vw, 15px); }

/* CALCULATOR (MOBILE FIRST TO TABLET) */
.calc-box { margin-bottom: 20px; }
.pkg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: clamp(10px, 2vw, 16px); margin-bottom: 20px; }
.pkg-btn { border-radius: 12px; padding: clamp(12px, 2vw, 16px) clamp(10px, 1.5vw, 14px); cursor: pointer; font-family: 'Sarabun', sans-serif; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: all 0.1s; position: relative; background: var(--card2); text-align: center; min-height: clamp(80px, 10vw, 110px); }
.pkg-btn:active { transform: scale(0.97); }
.pkg-btn .btn-name { font-size: clamp(13px, 2vw, 18px); font-weight: 800; }
.pkg-btn .btn-reg { font-size: clamp(10px, 1.5vw, 14px); text-decoration: line-through; opacity: 0.7; }
.pkg-btn .btn-price { font-size: clamp(15px, 2.5vw, 22px); font-weight: 800; }
.pkg-btn .btn-qty { position: absolute; top: -8px; right: -8px; background: var(--accent); color: #000; font-size: clamp(13px, 2vw, 16px); font-weight: 900; width: clamp(24px, 3.5vw, 32px); height: clamp(24px, 3.5vw, 32px); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

.pkg-btn[data-id="dog"]    { color: var(--tag-dog);    border-color: rgba(79, 195, 247, 0.3); }
.pkg-btn[data-id="std"]    { color: var(--tag-std);    border-color: rgba(129, 199, 132, 0.3); }
.pkg-btn[data-id="prem"]   { color: var(--tag-prem);   border-color: rgba(206, 147, 216, 0.3); }
.pkg-btn[data-id="premex"] { color: var(--tag-premex); border-color: rgba(255, 204, 128, 0.3); }
.pkg-btn[data-id="plus"]   { color: var(--tag-plus);   border-color: rgba(255, 140, 66, 0.3); }

.pkg-btn.selected[data-id="dog"]    { background: var(--tag-dog-bg);    border-color: var(--tag-dog); }
.pkg-btn.selected[data-id="std"]    { background: var(--tag-std-bg);    border-color: var(--tag-std); }
.pkg-btn.selected[data-id="prem"]   { background: var(--tag-prem-bg);   border-color: var(--tag-prem); }
.pkg-btn.selected[data-id="premex"] { background: var(--tag-premex-bg); border-color: var(--tag-premex); }
.pkg-btn.selected[data-id="plus"]   { background: var(--tag-plus-bg);   border-color: var(--tag-plus); }
.pkg-btn.selected { box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

/* RESULT CARD */
.calc-result { background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: clamp(18px, 3vw, 24px); box-shadow: 0 0 20px rgba(0,201,167,0.08); position: relative; }
.calc-empty { color: var(--muted); font-size: clamp(14px, 2vw, 18px); text-align: center; padding: 20px 0; }

.summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: clamp(13px, 2vw, 18px); }
.summary-row.reg { color: var(--muted); }
.summary-row.reg .val { text-decoration: line-through; }
.summary-row.event { color: var(--text); font-weight: 600; }
.summary-row.discount { color: var(--gold); font-weight: 700; background: rgba(245,200,66,0.1); padding: 6px 10px; border-radius: 8px; margin: 10px 0; }
.summary-row.final { border-top: 1px dashed var(--border); padding-top: 14px; margin-top: 6px; font-size: clamp(18px, 3vw, 28px); color: var(--accent); font-weight: 900; }
.summary-row.saving { color: var(--gold); font-size: clamp(14px, 2.5vw, 22px); font-weight: 800; justify-content: center; background: rgba(245,200,66,0.15); padding: 10px; border-radius: 8px; margin-top: 16px; border: 1px solid rgba(245,200,66,0.3); }

.hint-bar { margin-top: 16px; font-size: clamp(12px, 1.8vw, 16px); color: var(--text); padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center; }
.btn-clear { width: 100%; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: clamp(12px, 2vw, 16px); border-radius: 10px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: clamp(14px, 2vw, 18px); font-weight: 700; margin-top: 16px; }

/* TABLE SCENARIO */
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; justify-content: center; }
.filter-btn { background: var(--card2); border: 1px solid var(--border); color: var(--muted); padding: clamp(8px, 1.5vw, 12px) clamp(14px, 2vw, 20px); border-radius: 20px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: clamp(12px, 1.8vw, 16px); font-weight: 600; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 800; }

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); }
table { width: 100%; border-collapse: collapse; font-size: clamp(12px, 1.8vw, 16px); min-width: 600px; }
thead tr { background: #0d1929; }
th { padding: clamp(12px, 2vw, 16px); text-align: center; color: var(--muted); font-weight: 700; font-size: clamp(11px, 1.5vw, 15px); text-transform: uppercase; border-bottom: 1px solid var(--border); }
th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); }
td { padding: clamp(12px, 2vw, 16px); text-align: center; vertical-align: middle; }
td:first-child { text-align: left; }

.combo { display: flex; flex-wrap: wrap; gap: 4px; }
.pkg-tag { font-size: clamp(11px, 1.5vw, 15px); font-weight: 700; padding: 4px 8px; border-radius: 6px; border: 1px solid; }
.tag-dog    { background: var(--tag-dog-bg);    color: var(--tag-dog);    border-color: var(--tag-dog); }
.tag-std    { background: var(--tag-std-bg);    color: var(--tag-std);    border-color: var(--tag-std); }
.tag-prem   { background: var(--tag-prem-bg);   color: var(--tag-prem);   border-color: var(--tag-prem); }
.tag-premex { background: var(--tag-premex-bg); color: var(--tag-premex); border-color: var(--tag-premex); }
.tag-plus   { background: var(--tag-plus-bg);   color: var(--tag-plus);   border-color: var(--tag-plus); }

.price-final { font-weight: 800; font-size: clamp(15px, 2vw, 20px); color: var(--accent); }
.saving-cell { color: var(--gold); font-weight: 800; }
.section-label { font-size: clamp(12px, 1.8vw, 16px); font-weight: 800; color: var(--muted); padding: 10px 12px; background: #0d1929; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1>Geneus DNA</h1>
  <p>Live Event Calculator</p>
</div>

<div class="tab-container">
  <button class="tab-btn active" onclick="switchTab('calc')" id="btn-calc">🧮 จัดเซ็ตหน้างาน</button>
  <button class="tab-btn" onclick="switchTab('table')" id="btn-table">📊 ตารางทุกกรณี</button>
</div>

<!-- TAB 1: CALCULATOR -->
<div id="tab-calc" class="content active">
  <div class="promo-note">
    🎯 ลดเพิ่มทันที 1,000.- เมื่อซื้อครบ 15,000.-
    <span>(สะสมทุก 15k รับส่วนลดเพิ่มทีละ 1,000.-)</span>
  </div>

  <div class="pkg-grid" id="pkgButtons"></div>

  <div class="calc-result" id="calcResult">
    <div class="calc-empty">👆 แตะเลือกแพ็กเกจด้านบน<br><span style="font-size: clamp(11px, 1.5vw, 15px); opacity: 0.7; margin-top: 6px; display: block;">(แตะซ้ำเพื่อเพิ่มจำนวนชุด สูงสุด 6 ชุด)</span></div>
  </div>
</div>

<!-- TAB 2: SCENARIOS -->
<div id="tab-table" class="content">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterTable('all',this)">ทั้งหมด</button>
    <button class="filter-btn" onclick="filterTable('1',this)">1 ชุด</button>
    <button class="filter-btn" onclick="filterTable('2',this)">2 ชุด</button>
    <button class="filter-btn" onclick="filterTable('3',this)">3 ชุด</button>
    <button class="filter-btn" onclick="filterTable('4',this)">4 ชุด</button>
    <button class="filter-btn" onclick="filterTable('5',this)">5 ชุด</button>
    <button class="filter-btn" onclick="filterTable('6',this)">6 ชุด</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>แพ็กเกจที่จัดเซ็ต</th>
          <th>จำนวน</th>
          <th>รวมราคาหน้างาน</th>
          <th>ส่วนลด On-Top</th>
          <th>สุทธิ (บาท)</th>
          <th>ประหยัดไป</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const PACKAGES = [
  { id:'dog',    label:'Dog DNA',      price:5500, regPrice:6500,  cls:'tag-dog' },
  { id:'std',    label:'Standard',     price:4500, regPrice:5900,  cls:'tag-std' },
  { id:'prem',   label:'Premium',      price:6900, regPrice:8900,  cls:'tag-prem' },
  { id:'plus',   label:'Premium Plus', price:9500, regPrice:11900, cls:'tag-plus' },
  { id:'premex', label:'Exclusive',    price:8900, regPrice:11900, cls:'tag-premex' }
];

const getDisc = t => Math.floor(t/15000)*1000;
const fmt = n => Math.round(n).toLocaleString('th-TH');

// ── TABS ──
function switchTab(tabId) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.getElementById(`btn-${tabId}`).classList.add('active');
}

// ── CALCULATOR ──
let cart = {};

function buildButtons() {
  const wrap = document.getElementById('pkgButtons');
  PACKAGES.forEach(p => {
    const b = document.createElement('button');
    b.className = 'pkg-btn'; b.dataset.id = p.id;
    // Mobile optimized button
    b.innerHTML = `
      <span class="btn-name">${p.label}</span>
      <span class="btn-reg">ปกติ ฿${fmt(p.regPrice)}</span>
      <span class="btn-price">฿${fmt(p.price)}</span>
    `;
    b.addEventListener('click', () => { addItem(p.id); });
    wrap.appendChild(b);
  });
}

function addItem(id) {
  const qty = Object.values(cart).reduce((a,b)=>a+b,0);
  if (qty >= 6) return;
  cart[id] = (cart[id]||0)+1;
  renderCalc();
}

function clearCalc() {
  cart = {};
  renderCalc();
}

function renderCalc() {
  const qty = Object.values(cart).reduce((a,b)=>a+b,0);

  // Update button states
  PACKAGES.forEach(p => {
    const btn = document.querySelector(`.pkg-btn[data-id="${p.id}"]`);
    const old = btn.querySelector('.btn-qty');
    if (old) old.remove();
    const cnt = cart[p.id]||0;
    if (cnt > 0) {
      btn.classList.add('selected');
      const badge = document.createElement('span');
      badge.className='btn-qty'; badge.textContent=cnt;
      btn.appendChild(badge);
    } else {
      btn.classList.remove('selected');
    }
  });

  const res = document.getElementById('calcResult');
  if (qty === 0) {
    res.innerHTML = '<div class="calc-empty">👆 แตะเลือกแพ็กเกจด้านบน<br><span style="font-size: clamp(11px, 1.5vw, 15px); opacity: 0.7; margin-top: 6px; display: block;">(แตะซ้ำเพื่อเพิ่มจำนวนชุด สูงสุด 6 ชุด)</span></div>';
    return;
  }

  const totalReg = Object.entries(cart).reduce((s,[id,cnt])=>s+PACKAGES.find(x=>x.id===id).regPrice*cnt,0);
  const totalEvent = Object.entries(cart).reduce((s,[id,cnt])=>s+PACKAGES.find(x=>x.id===id).price*cnt,0);
  const disc = getDisc(totalEvent);
  const finalAmt = totalEvent - disc;
  const totalSaved = totalReg - finalAmt;

  const rem = 15000 - (totalEvent % 15000);
  const hint = rem < 15000 && qty < 6
    ? `<div class="hint-bar">💡 ซื้อเพิ่มอีก <strong>฿${fmt(rem)}</strong> รับส่วนลดเพิ่ม 1,000.- ทันที</div>`
    : '';

  res.innerHTML = `
    <div class="summary-row reg">
      <span>ราคาปกติหน้าร้านรวม:</span>
      <span class="val">฿${fmt(totalReg)}</span>
    </div>
    <div class="summary-row event" style="margin-top:4px;">
      <span>แต่ถ้าซื้อในงานนี้จะเป็นราคา:</span>
      <span>฿${fmt(totalEvent)}</span>
    </div>
    ${disc > 0 ? `
    <div class="summary-row discount">
      <span>ส่วนลด On-Top งาน:</span>
      <span>- ฿${fmt(disc)}</span>
    </div>` : ''}
    <div class="summary-row final">
      <span>ยอดชำระสุทธิ:</span>
      <span>฿${fmt(finalAmt)}</span>
    </div>
    <div class="summary-row saving">
      🎉 ประหยัดไปทั้งหมด ฿${fmt(totalSaved)}
    </div>
    ${hint}
    <button class="btn-clear" onclick="clearCalc()">✕ ล้างตะกร้าใหม่</button>
  `;
}

// ── TABLE SCENARIOS ──
function genScenarios() {
  const rows=[], seen=new Set();
  function comb(k,start,cur) {
    if (cur.length===k) {
      const key=[...cur].map(x=>x.id).sort().join('-');
      if (seen.has(key)) return; seen.add(key);
      const totalEvent = cur.reduce((s,p)=>s+p.price,0);
      const totalReg = cur.reduce((s,p)=>s+p.regPrice,0);
      const disc = getDisc(totalEvent);
      const finalAmt = totalEvent - disc;
      rows.push({combo:[...cur], qty:k, totalEvent, totalReg, disc, final:finalAmt, saved: totalReg - finalAmt});
      return;
    }
    for (let i=start;i<PACKAGES.length;i++) comb(k,i,[...cur,PACKAGES[i]]);
  }
  for (let k=1;k<=6;k++) comb(k,0,[]);
  rows.sort((a,b)=>a.qty-b.qty || a.totalEvent-b.totalEvent);
  return rows;
}

function renderTable(rows) {
  const tbody=document.getElementById('tableBody');
  let lastQty=null;
  rows.forEach(row=>{
    if (row.qty!==lastQty) {
      const sep=document.createElement('tr');
      sep.innerHTML=`<td colspan="6" class="section-label">📦 ซื้อ ${row.qty} ชุด</td>`;
      sep.dataset.qty=row.qty; 
      tbody.appendChild(sep); lastQty=row.qty;
    }
    const counts={};
    row.combo.forEach(p=>{counts[p.id]=(counts[p.id]||0)+1;});

    const tags = row.combo
      .filter((p,i,a)=>a.findIndex(x=>x.id===p.id)===i)
      .map(p=>`<span class="pkg-tag ${p.cls}">${p.label}${counts[p.id]>1?' ×'+counts[p.id]:''}</span>`)
      .join('');

    const tr=document.createElement('tr');
    tr.dataset.qty=row.qty;
    tr.innerHTML=`
      <td><div class="combo">${tags}</div></td>
      <td style="font-weight:700;">${row.qty}</td>
      <td style="color:var(--text);font-weight:600;">฿${fmt(row.totalEvent)}</td>
      <td>${row.disc>0?`<span style="color:var(--gold);font-weight:700;">-฿${fmt(row.disc)}</span>`:`<span style="color:var(--muted)">—</span>`}</td>
      <td><span class="price-final">฿${fmt(row.final)}</span></td>
      <td><span class="saving-cell">฿${fmt(row.saved)}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

function filterTable(val,btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    if(!tr.dataset.qty) return;
    tr.style.display = (val==='all' || tr.dataset.qty===val) ? '' : 'none';
  });
}

buildButtons();
renderTable(genScenarios());
</script>
</body>
</html>
